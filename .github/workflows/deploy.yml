name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (main branch, root)
        # The repo is already configured to serve from main:/
        # This workflow just confirms the deploy succeeded on each push.
        run: |
          echo "✅ Pushed to main — GitHub Pages will rebuild automatically."
          echo "Live URL: https://agencebabylonfundraising-lab.github.io/babylon-agency/"
